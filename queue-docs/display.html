<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าจอเรียกคิว (Queue Display)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; text-align: center; margin-top: 50px; }
        .board { background: #34495e; padding: 30px; border-radius: 15px; width: 60%; margin: 0 auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .queue-item { background: #e74c3c; margin: 15px 0; padding: 20px; border-radius: 10px; font-size: 2em; display: flex; justify-content: space-between; }
        .queue-num { font-weight: bold; font-size: 1.5em; }
        .counter { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="board">
        <h1>กำลังเรียกคิว</h1>
        <div id="queue-list">
            </div>
    </div>

    <script>
        async function fetchActiveQueues() {
            try {
                // ดึงข้อมูลจาก API ผ่าน Nginx ที่พอร์ต 80
                const response = await fetch('http://localhost/queues/active');
                const data = await response.json();
                
                const list = document.getElementById('queue-list');
                list.innerHTML = ''; // ล้างค่าเก่า
                
                if(data.length === 0) {
                    list.innerHTML = '<p>ยังไม่มีการเรียกคิว</p>';
                    return;
                }

                data.forEach(q => {
                    list.innerHTML += `
                        <div class="queue-item">
                            <span>หมายเลข <span class="queue-num">${q.queue_number}</span></span>
                            <span class="counter">ช่องบริการ ${q.counter_number}</span>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // สั่งให้ดึงข้อมูลใหม่ทุกๆ 2 วินาที
        setInterval(fetchActiveQueues, 2000);
        fetchActiveQueues();
    </script>
</body>
</html>
