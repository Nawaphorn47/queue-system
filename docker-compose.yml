version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: queue_db
    ports:
      - "5432:5432"
  
  api:
    build: ./api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://root:123456789@db:5432/queue_db

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - api